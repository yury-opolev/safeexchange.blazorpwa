<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https://graph.microsoft.com;
        font-src 'self';
        connect-src 'self' http://localhost:7071 https://localhost:7071 https://login.microsoftonline.com https://*.azurewebsites.net https://graph.microsoft.com https://*.applicationinsights.azure.com https://*.in.applicationinsights.azure.com https://*.livediagnostics.monitor.azure.com https://js.monitor.azure.com;
        frame-src https://login.microsoftonline.com;
        form-action 'self' https://login.microsoftonline.com;
        worker-src 'self';
        manifest-src 'self';
        base-uri 'self';
        object-src 'none';
    ">

    <title>SafeExchange</title>
    <base href="/" />
    <link href="_content/SafeExchange.Client.Web.Components/css/bootstrap.min.css" rel="stylesheet" />
    <link href="_content/SafeExchange.Client.Web.Components/css/quill.snow.2.0.3.css" rel="stylesheet" />
    <link href="_content/SafeExchange.Client.Web.Components/quill-modules/quill-blot-formatter2.css" rel="stylesheet" />
    <link href="_content/SafeExchange.Client.Web.Components/css/app.css" rel="stylesheet" />
    <link href="css/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="SafeExchange.PWA.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <!--
        sw-registrator.js and the telemetry wrapper both need to run
        before blazor.webassembly.js so their window.* functions are
        defined when Blazor's runtime fires JS interop from component
        lifecycles (OnInitializedAsync).
    -->
    <script src="sw-registrator.js"></script>

    <!--
        Application Insights JS SDK is bundled locally (wwwroot/js/)
        rather than loaded from the Microsoft CDN so script-src can
        stay at 'self' — see docs/telemetry/security-considerations.md.
        telemetry.js provides a thin window.saexTelemetry wrapper that
        gates all emission on authentication state.
    -->
    <script src="_content/SafeExchange.Client.Web.Components/js/ai.3.3.9.min.js"></script>
    <script src="_content/SafeExchange.Client.Web.Components/js/telemetry.js"></script>
    <script src="_content/SafeExchange.Client.Web.Components/js/saexDownload.js"></script>

    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>

    <script src="_content/SafeExchange.Client.Web.Components/js/jquery-3.3.1.slim.min.js"></script>
    <script src="_content/SafeExchange.Client.Web.Components/js/bootstrap.bundle.min.js"></script>

    <script src="_content/SafeExchange.Client.Web.Components/quill.2.0.3.min.js"></script>
    <script src="_content/SafeExchange.Client.Web.Components/quill-modules/image-drop.min.js"></script>
    <script src="_content/SafeExchange.Client.Web.Components/quill-modules/quill-blot-formatter2.min.js"></script>
</body>

</html>
